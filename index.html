<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREOHUB Finance Insights</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #2563eb,
        #38bdf8
    );
}

/* Background Effects */

.bg-circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
}

.circle1{
    width:300px;
    height:300px;
    top:-80px;
    left:-80px;
}

.circle2{
    width:450px;
    height:450px;
    bottom:-150px;
    right:-150px;
}

/* Login Card */

.login-card{

    width:450px;

    padding:40px;

    border-radius:24px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0 25px 60px rgba(0,0,0,0.25);

    text-align:center;

    color:white;

    z-index:10;
}

/* CREOHUB Logo */

.logo{

    width:220px;
    height:75px;

    margin:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#f97316;

    border-radius:12px;

    color:white;

    font-size:26px;
    font-weight:700;

    letter-spacing:1px;

    margin-bottom:25px;

    box-shadow:
    0 12px 30px rgba(249,115,22,.45);
}

.logo .hub{
    color:#fff7ed;
    margin-left:4px;
}

/* Titles */

h1{
    font-size:28px;
    margin-bottom:8px;
}

.subtitle{
    color:#dbeafe;
    margin-bottom:30px;
    font-size:14px;
}

/* Inputs */

input{

    width:100%;

    padding:14px 16px;

    margin-bottom:15px;

    border:none;

    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.15);

    color:white;

    font-size:15px;
}

input::placeholder{
    color:#e2e8f0;
}

/* Button */

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:white;

    color:#1e3a8a;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 12px 25px rgba(255,255,255,.25);
}

/* Error Message */

#error{
    color:#fecaca;
    margin-top:15px;
    font-size:14px;
}

/* Footer */

.footer{
    margin-top:20px;
    font-size:12px;
    color:#cbd5e1;
}

</style>
</head>

<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="login-card">

    <div class="logo">
        <span>CREO</span><span class="hub">HUB</span>
    </div>

    <h1>Finance Insights</h1>

    <div class="subtitle">
        Secure Financial Intelligence Portal
    </div>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="login()">
        Sign In
    </button>

    <div id="error"></div>

    <div class="footer">
        Powered by OpenAI
    </div>

</div>

<script>

function login(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    if(
        username === "admin" &&
        password === "CreoHub"
    ){

        window.location.href =
        "https://chatgpt.com/g/g-6a32720579248191aafba07c89e523fb-finance-insights-19-06";

    }
    else{

        document.getElementById("error").innerHTML =
        "Invalid Username or Password";

    }
}

/* Login on Enter Key */

document.getElementById("password")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        login();
    }

});

</script>

</body>
</html>
